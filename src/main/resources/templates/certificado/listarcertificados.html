<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Certificados</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h4 class="card-title mb-0">Certificados</h4>
			<a th:href="@{/certificado/nuevo}" class="btn btn-primary">+ Nuevo Certificado</a>
		</div>
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>Id</th>
						<th>Id Examen</th>
						<th>Fecha Generación</th>
						<th>Observaciones</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="certificado : ${listacertificados}">
						<td th:text="${certificado.idCertificado}"></td>
						<td th:text="${certificado.idExamen}"></td>
						<td th:text="${#dates.format(certificado.fechaGeneracion, 'dd/MM/yyyy')}"></td>
						<td th:text="${certificado.observaciones}"></td>
						<td class="actions-cell">
							<div class="action-icons">
								<a th:href="@{/certificado/editar/{id}(id=${certificado.idCertificado})}"
									class="btn btn-primary btn-icon" title="Editar"><i class="mdi mdi-pencil"></i></a>
								<form th:action="@{/certificado/eliminar/{id}(id=${certificado.idCertificado})}" method="post"
									onsubmit="return confirm('¿Eliminar este certificado?');">
									<button type="submit" class="btn btn-danger btn-icon" title="Eliminar"><i class="mdi mdi-delete"></i></button>
								</form>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(listacertificados)}">
						<td colspan="5" class="text-center">No hay certificados registrados.</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>

</html>
