<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Nueva Cita</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="row">
			<div class="col-md-6 offset-md-3 grid-margin stretch-card">
				<div class="card">
					<div class="card-body">

						<h4 class="card-title">Nueva Cita</h4>
						<p class="card-description">Registro de una nueva cita</p>

						<form th:action="@{/cita/guardar}" th:object="${cita}"
							method="post" class="forms-sample">

							<div class="form-group">
								<label for="fecha">Fecha</label>
								<input type="date" th:field="*{fecha}"
									class="form-control" id="fecha">
							</div>

							<div class="form-group">
								<label for="hora">Hora</label>
								<input type="time" th:field="*{hora}"
									class="form-control" id="hora">
							</div>

							<div class="form-group">
								<label for="tipoCita">Tipo de Cita</label>
								<input type="text" th:field="*{tipoCita}" class="form-control"
									id="tipoCita" placeholder="Ingrese el tipo de cita">
							</div>

							<div class="form-group">
								<label for="estado">Estado</label>
								<input type="text" th:field="*{estado}" class="form-control"
									id="estado" placeholder="Ej. PENDIENTE, CONFIRMADA, CANCELADA">
							</div>

							<button type="submit" class="btn btn-primary mr-2">Crear</button>
							<a th:href="@{/cita}" class="btn btn-dark">Cancelar</a>

						</form>

					</div>
				</div>
			</div>
		</div>

	</div>

</body>

</html>
