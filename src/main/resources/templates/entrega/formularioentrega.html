<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title th:text="${entrega.idEntrega == 0} ? 'Nueva Entrega' : 'Editar Entrega'">Nueva Entrega</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="row">
			<div class="col-md-6 offset-md-3 grid-margin stretch-card">
				<div class="card">
					<div class="card-body">

						<h4 class="card-title" th:text="${entrega.idEntrega == 0} ? 'Nueva Entrega' : 'Editar Entrega'">Nueva Entrega</h4>
						<p class="card-description"
							th:text="${entrega.idEntrega == 0} ? 'Registro de una nueva entrega' : 'Actualizar entrega'">Registro de una nueva entrega</p>

						<form
							th:action="${entrega.idEntrega == 0} ? @{/entrega/guardar} : @{/entrega/actualizar/{id}(id=${entrega.idEntrega})}"
							th:object="${entrega}" method="post" class="forms-sample">

							<div class="form-group">
								<label for="idCliente">Id Cliente</label>
								<input type="number" th:field="*{idCliente}" class="form-control"
									id="idCliente" placeholder="Ingrese el id del cliente">
							</div>

							<div class="form-group">
								<label for="fechaEntrega">Fecha de Entrega</label>
								<input type="date" th:field="*{fechaEntrega}"
									class="form-control" id="fechaEntrega">
							</div>

							<div class="form-group">
								<label for="observaciones">Observaciones</label>
								<input type="text" th:field="*{observaciones}" class="form-control"
									id="observaciones" placeholder="Ingrese las observaciones">
							</div>

							<div class="form-group">
								<label for="estado">Estado</label>
								<input type="text" th:field="*{estado}" class="form-control"
									id="estado" placeholder="Ej. PENDIENTE, ENTREGADO">
							</div>

							<input type="hidden" th:field="*{idEntrega}">

							<button type="submit" class="btn btn-primary mr-2"
								th:text="${entrega.idEntrega == 0} ? 'Crear' : 'Actualizar'">Crear</button>
							<a th:href="@{/entrega}" class="btn btn-dark">Cancelar</a>

						</form>

					</div>
				</div>
			</div>
		</div>

	</div>

</body>

</html>
