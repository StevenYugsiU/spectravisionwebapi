<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Entregas</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h4 class="card-title mb-0">Entregas</h4>
			<a th:href="@{/entrega/nuevo}" class="btn btn-primary">+ Nueva Entrega</a>
		</div>
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>Id</th>
						<th>Id Cliente</th>
						<th>Fecha Entrega</th>
						<th>Observaciones</th>
						<th>Estado</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="entrega : ${listaentregas}">
						<td th:text="${entrega.idEntrega}"></td>
						<td th:text="${entrega.idCliente}"></td>
						<td th:text="${#dates.format(entrega.fechaEntrega, 'dd/MM/yyyy')}"></td>
						<td th:text="${entrega.observaciones}"></td>
						<td><span class="badge-soft badge-soft-info" th:text="${entrega.estado}"></span></td>
						<td class="actions-cell">
							<div class="action-icons">
								<a href="#" class="btn btn-primary btn-icon" title="Editar"><i class="mdi mdi-pencil"></i></a>
								<a href="#" class="btn btn-danger btn-icon" title="Eliminar"><i class="mdi mdi-delete"></i></a>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(listaentregas)}">
						<td colspan="6" class="text-center">No hay entregas registradas.</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>

</html>
