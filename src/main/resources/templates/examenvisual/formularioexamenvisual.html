<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title th:text="${examenvisual.idExamen == 0} ? 'Nuevo Examen Visual' : 'Editar Examen Visual'">Nuevo Examen Visual</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="row">
			<div class="col-md-6 offset-md-3 grid-margin stretch-card">
				<div class="card">
					<div class="card-body">

						<h4 class="card-title"
							th:text="${examenvisual.idExamen == 0} ? 'Nuevo Examen Visual' : 'Editar Examen Visual'">Nuevo Examen Visual</h4>
						<p class="card-description"
							th:text="${examenvisual.idExamen == 0} ? 'Registro de un nuevo examen visual' : 'Actualizar examen visual'">Registro de un nuevo examen visual</p>

						<form
							th:action="${examenvisual.idExamen == 0} ? @{/examenvisual/guardar} : @{/examenvisual/actualizar/{id}(id=${examenvisual.idExamen})}"
							th:object="${examenvisual}" method="post" class="forms-sample">

							<div class="form-group">
								<label for="idHistoria">Id Historia Clínica</label>
								<input type="number" th:field="*{idHistoria}" class="form-control"
									id="idHistoria" placeholder="Ingrese el id de la historia clínica">
							</div>

							<div class="form-group">
								<label for="fechaExamen">Fecha del Examen</label>
								<input type="date" th:field="*{fechaExamen}"
									class="form-control" id="fechaExamen">
							</div>

							<div class="form-group">
								<label for="ultimoControlVisual">Último Control Visual</label>
								<input type="text" th:field="*{ultimoControlVisual}" class="form-control"
									id="ultimoControlVisual" placeholder="Ingrese el último control visual">
							</div>

							<div class="form-group">
								<label for="motivoConsulta">Motivo de Consulta</label>
								<input type="text" th:field="*{motivoConsulta}" class="form-control"
									id="motivoConsulta" placeholder="Ingrese el motivo de consulta">
							</div>

							<div class="form-group">
								<label for="avOd">Agudeza Visual OD</label>
								<input type="text" th:field="*{avOd}" class="form-control"
									id="avOd" placeholder="Ingrese la agudeza visual OD">
							</div>

							<div class="form-group">
								<label for="avOi">Agudeza Visual OI</label>
								<input type="text" th:field="*{avOi}" class="form-control"
									id="avOi" placeholder="Ingrese la agudeza visual OI">
							</div>

							<div class="form-group">
								<label for="sphOd">Esfera OD</label>
								<input type="text" th:field="*{sphOd}" class="form-control"
									id="sphOd" placeholder="Ingrese la esfera OD">
							</div>

							<div class="form-group">
								<label for="cylOd">Cilindro OD</label>
								<input type="text" th:field="*{cylOd}" class="form-control"
									id="cylOd" placeholder="Ingrese el cilindro OD">
							</div>

							<div class="form-group">
								<label for="ejeOd">Eje OD</label>
								<input type="text" th:field="*{ejeOd}" class="form-control"
									id="ejeOd" placeholder="Ingrese el eje OD">
							</div>

							<div class="form-group">
								<label for="sphOi">Esfera OI</label>
								<input type="text" th:field="*{sphOi}" class="form-control"
									id="sphOi" placeholder="Ingrese la esfera OI">
							</div>

							<div class="form-group">
								<label for="cylOi">Cilindro OI</label>
								<input type="text" th:field="*{cylOi}" class="form-control"
									id="cylOi" placeholder="Ingrese el cilindro OI">
							</div>

							<div class="form-group">
								<label for="ejeOi">Eje OI</label>
								<input type="text" th:field="*{ejeOi}" class="form-control"
									id="ejeOi" placeholder="Ingrese el eje OI">
							</div>

							<div class="form-group">
								<label for="addValor">Adición</label>
								<input type="text" th:field="*{addValor}" class="form-control"
									id="addValor" placeholder="Ingrese el valor de adición">
							</div>

							<div class="form-group">
								<label for="dnp">DNP</label>
								<input type="text" th:field="*{dnp}" class="form-control"
									id="dnp" placeholder="Ingrese el DNP">
							</div>

							<div class="form-group">
								<label for="altura">Altura</label>
								<input type="text" th:field="*{altura}" class="form-control"
									id="altura" placeholder="Ingrese la altura">
							</div>

							<div class="form-group">
								<label for="biomicroscopia">Biomicroscopía</label>
								<input type="text" th:field="*{biomicroscopia}" class="form-control"
									id="biomicroscopia" placeholder="Ingrese la biomicroscopía">
							</div>

							<div class="form-group">
								<label for="recomentaciones">Recomendaciones</label>
								<input type="text" th:field="*{recomentaciones}" class="form-control"
									id="recomentaciones" placeholder="Ingrese las recomendaciones">
							</div>

							<div class="form-group">
								<label for="proximaConsulta">Próxima Consulta</label>
								<input type="text" th:field="*{proximaConsulta}" class="form-control"
									id="proximaConsulta" placeholder="Ingrese la próxima consulta">
							</div>

							<div class="form-group">
								<label for="diagnostico">Diagnóstico</label>
								<input type="text" th:field="*{diagnostico}" class="form-control"
									id="diagnostico" placeholder="Ingrese el diagnóstico">
							</div>

							<input type="hidden" th:field="*{idExamen}">

							<button type="submit" class="btn btn-primary mr-2"
								th:text="${examenvisual.idExamen == 0} ? 'Crear' : 'Actualizar'">Crear</button>
							<a th:href="@{/examenvisual}" class="btn btn-dark">Cancelar</a>

						</form>

					</div>
				</div>
			</div>
		</div>

	</div>

</body>

</html>
