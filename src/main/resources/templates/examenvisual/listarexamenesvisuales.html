<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Exámenes Visuales</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h4 class="card-title mb-0">Exámenes Visuales</h4>
			<a th:href="@{/examenvisual/nuevo}" class="btn btn-primary">+ Nuevo Examen Visual</a>
		</div>
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>Id</th>
						<th>Id Historia</th>
						<th>Fecha Examen</th>
						<th>Motivo Consulta</th>
						<th>Diagnóstico</th>
						<th>Próxima Consulta</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="examen : ${listaexamenesvisuales}">
						<td th:text="${examen.idExamen}"></td>
						<td th:text="${examen.idHistoria}"></td>
						<td th:text="${#dates.format(examen.fechaExamen, 'dd/MM/yyyy')}"></td>
						<td th:text="${examen.motivoConsulta}"></td>
						<td th:text="${examen.diagnostico}"></td>
						<td th:text="${examen.proximaConsulta}"></td>
						<td class="actions-cell">
							<div class="action-icons">
								<a th:href="@{/examenvisual/editar/{id}(id=${examen.idExamen})}"
									class="btn btn-primary btn-icon" title="Editar"><i class="mdi mdi-pencil"></i></a>
								<form th:action="@{/examenvisual/eliminar/{id}(id=${examen.idExamen})}" method="post"
									onsubmit="return confirm('¿Eliminar este examen visual?');">
									<button type="submit" class="btn btn-danger btn-icon" title="Eliminar"><i class="mdi mdi-delete"></i></button>
								</form>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(listaexamenesvisuales)}">
						<td colspan="7" class="text-center">No hay exámenes visuales registrados.</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>

</html>
