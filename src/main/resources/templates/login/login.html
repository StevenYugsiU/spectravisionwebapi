<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>SpectraVision - Login</title>
<link rel="stylesheet"
	th:href="@{/assets/vendors/mdi/css/materialdesignicons.min.css}">
<link rel="stylesheet"
	th:href="@{/assets/vendors/css/vendor.bundle.base.css}">
<link rel="stylesheet" th:href="@{/assets/css/style.css}">
<link rel="stylesheet" th:href="@{/assets/css/custom.css}">
<link rel="shortcut icon" th:href="@{/assets/images/favicon.png}" />
</head>

<body>
	<div class="container-scroller">
		<div class="container-fluid page-body-wrapper full-page-wrapper">
			<div class="row w-100 m-0">
				<div
					class="content-wrapper full-page-wrapper d-flex align-items-center auth login-bg">
					<div class="card col-lg-4 mx-auto">
						<div class="card-body px-5 py-5">
							<h3 class="card-title text-left mb-3">Login</h3>
							<form th:action="@{/login}" method="post">
								<div class="form-group">
									<label>Usuario*</label>
									<input type="text" name="usuario" class="form-control p_input">
								</div>
								<div class="form-group">
									<label>Contraseña*</label>
									<input type="password" name="password" class="form-control p_input">
								</div>
								<div
									class="form-group d-flex align-items-center justify-content-between">
									<div class="form-check">
										<label class="form-check-label"> <input type="checkbox"
											class="form-check-input"> Recordarme
										</label>
									</div>
									<a href="#" class="forgot-pass">¿Olvidó su contraseña?</a>
								</div>
								<div class="text-center">
									<button type="submit" class="btn btn-primary btn-block enter-btn">Ingresar</button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script th:src="@{/assets/vendors/js/vendor.bundle.base.js}"></script>
	<script th:src="@{/assets/js/off-canvas.js}"></script>
	<script th:src="@{/assets/js/hoverable-collapse.js}"></script>
	<script th:src="@{/assets/js/misc.js}"></script>
	<script th:src="@{/assets/js/settings.js}"></script>
	<script th:src="@{/assets/js/todolist.js}"></script>
</body>
</html>
