<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Roles</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<h4 class="card-title">Roles</h4>
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>Id</th>
						<th>Nombre</th>
						<th>Descripción</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="rol : ${listaroles}">
						<td th:text="${rol.idRol}"></td>
						<td th:text="${rol.nombre}"></td>
						<td th:text="${rol.descripcion}"></td>
					</tr>
					<tr th:if="${#lists.isEmpty(listaroles)}">
						<td colspan="3" class="text-center">No hay roles registrados.</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>

</html>
