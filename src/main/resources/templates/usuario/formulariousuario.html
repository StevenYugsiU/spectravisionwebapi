<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Nuevo Usuario</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="row">
			<div class="col-md-6 offset-md-3 grid-margin stretch-card">
				<div class="card">
					<div class="card-body">

						<h4 class="card-title">Nuevo Usuario</h4>
						<p class="card-description">Registro de un nuevo usuario</p>

						<form th:action="@{/usuario/guardar}" th:object="${usuario}"
							method="post" class="forms-sample">

							<div class="form-group">
								<label for="nombres">Nombres</label>
								<input type="text" th:field="*{nombres}" class="form-control"
									id="nombres" placeholder="Ingrese los nombres">
							</div>

							<div class="form-group">
								<label for="apellidos">Apellidos</label>
								<input type="text" th:field="*{apellidos}" class="form-control"
									id="apellidos" placeholder="Ingrese los apellidos">
							</div>

							<div class="form-group">
								<label for="usuario">Usuario</label>
								<input type="text" th:field="*{usuario}" class="form-control"
									id="usuario" placeholder="Ingrese el usuario">
							</div>

							<div class="form-group">
								<label for="contrasena">Contraseña</label>
								<input type="password" th:field="*{contrasena}" class="form-control"
									id="contrasena" placeholder="Ingrese la contraseña">
							</div>

							<div class="form-check form-check-flat form-check-primary">
								<label class="form-check-label"> <input type="checkbox"
									th:field="*{estado}" class="form-check-input"> Activo
								</label>
							</div>

							<button type="submit" class="btn btn-primary mr-2">Crear</button>
							<a th:href="@{/usuario}" class="btn btn-dark">Cancelar</a>

						</form>

					</div>
				</div>
			</div>
		</div>

	</div>

</body>

</html>
