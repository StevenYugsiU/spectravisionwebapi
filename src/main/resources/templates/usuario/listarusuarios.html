<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Usuarios</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<h4 class="card-title">Usuarios</h4>
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>Id</th>
						<th>Nombres</th>
						<th>Apellidos</th>
						<th>Usuario</th>
						<th>Estado</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="usuario : ${listausuarios}">
						<td th:text="${usuario.idUsuario}"></td>
						<td th:text="${usuario.nombres}"></td>
						<td th:text="${usuario.apellidos}"></td>
						<td th:text="${usuario.usuario}"></td>
						<td><span class="badge"
							th:classappend="${usuario.estado} ? 'badge-success' : 'badge-danger'"
							th:text="${usuario.estado} ? 'Activo' : 'Inactivo'"></span></td>
					</tr>
					<tr th:if="${#lists.isEmpty(listausuarios)}">
						<td colspan="5" class="text-center">No hay usuarios registrados.</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>

</html>
