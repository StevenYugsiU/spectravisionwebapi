<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="/layout/layout">

<head>
<meta charset="utf-8">
<meta name="viewport"
	content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Usuarios</title>
</head>

<body>

	<div layout:fragment="cargarpaginas">

		<div class="d-flex justify-content-between align-items-center mb-3">
			<h4 class="card-title mb-0">Usuarios</h4>
			<a th:href="@{/usuario/nuevo}" class="btn btn-primary">+ Nuevo Usuario</a>
		</div>
		<div class="table-responsive">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>Id</th>
						<th>Nombres</th>
						<th>Apellidos</th>
						<th>Usuario</th>
						<th>Estado</th>
						<th></th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="usuario : ${listausuarios}">
						<td th:text="${usuario.idUsuario}"></td>
						<td th:text="${usuario.nombres}"></td>
						<td th:text="${usuario.apellidos}"></td>
						<td th:text="${usuario.usuario}"></td>
						<td><span class="badge-soft"
							th:classappend="${usuario.estado} ? 'badge-soft-success' : 'badge-soft-danger'"
							th:text="${usuario.estado} ? 'Activo' : 'Inactivo'"></span></td>
						<td class="actions-cell">
							<div class="action-icons">
								<form th:action="@{/usuario/eliminar/{id}(id=${usuario.idUsuario})}" method="post"
									onsubmit="return confirm('¿Eliminar este usuario?');">
									<button type="submit" class="btn btn-danger btn-icon" title="Eliminar"><i class="mdi mdi-delete"></i></button>
								</form>
							</div>
						</td>
					</tr>
					<tr th:if="${#lists.isEmpty(listausuarios)}">
						<td colspan="6" class="text-center">No hay usuarios registrados.</td>
					</tr>
				</tbody>
			</table>
		</div>

	</div>

</body>

</html>
